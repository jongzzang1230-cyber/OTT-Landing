<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - StreamBlue</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── 로그인 페이지 전용 스타일 ── */
    body { background: var(--navy); min-height: 100vh; display: flex; flex-direction: column; }

    /* 배경 장식 */
    .login-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    .login-orb {
      position: absolute; border-radius: 50%;
      filter: blur(90px); opacity: .45;
    }
    .login-orb.o1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #1e90ff, transparent 70%);
      top: -160px; right: -100px;
      animation: orbFloat 9s ease-in-out infinite;
    }
    .login-orb.o2 {
      width: 360px; height: 360px;
      background: radial-gradient(circle, #0060df, transparent 70%);
      bottom: -100px; left: -80px;
      animation: orbFloat 7s ease-in-out infinite reverse;
    }

    /* 헤더 */
    .login-header {
      position: relative; z-index: 10;
      padding: 24px 40px;
      display: flex; align-items: center;
    }
    .login-logo {
      display: flex; align-items: center; gap: 10px;
      color: #fff; font-size: 1.2rem; font-weight: 800;
      text-decoration: none; letter-spacing: -.5px;
    }

    /* 메인 영역 */
    .login-main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 20px 24px 60px; position: relative; z-index: 1;
    }

    /* 카드 */
    .login-card {
      width: 100%; max-width: 440px;
      background: rgba(26, 47, 71, 0.75);
      border: 1.5px solid rgba(30, 144, 255, .2);
      border-radius: 24px;
      padding: 44px 40px;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 80px rgba(0,0,0,.5);
      animation: cardIn .45s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform: translateY(28px) scale(.97); }
      to   { opacity:1; transform: translateY(0)  scale(1);    }
    }

    .login-card h1 {
      font-size: 1.7rem; font-weight: 800;
      color: #fff; margin-bottom: 6px;
    }
    .login-card .subtitle {
      color: rgba(255,255,255,.5); font-size: .9rem; margin-bottom: 32px;
    }

    /* 폼 */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; color: rgba(255,255,255,.7);
      font-size: .82rem; font-weight: 600;
      margin-bottom: 7px; letter-spacing: .02em;
    }
    .form-group input {
      width: 100%;
      background: rgba(255,255,255,.07);
      border: 1.5px solid rgba(30,144,255,.25);
      border-radius: 12px;
      padding: 13px 16px;
      color: #fff; font-size: .95rem;
      outline: none; transition: border-color .25s, background .25s;
      font-family: inherit;
    }
    .form-group input::placeholder { color: rgba(255,255,255,.3); }
    .form-group input:focus {
      border-color: var(--blue);
      background: rgba(30,144,255,.1);
    }

    /* 비밀번호 토글 */
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 46px; }
    .pw-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,.4); cursor: pointer; font-size: .9rem;
      transition: color .2s; user-select: none; line-height: 1;
    }
    .pw-toggle:hover { color: rgba(255,255,255,.8); }

    /* 이메일 유효성 표시 */
    .field-msg {
      font-size: .75rem; margin-top: 5px;
      display: none;
    }
    .field-msg.error { color: #ff6b6b; display: block; }
    .field-msg.ok    { color: #4ade80; display: block; }

    /* 옵션 행 */
    .form-options {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 22px;
    }
    .remember-wrap {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
    }
    .remember-wrap input[type="checkbox"] { accent-color: var(--blue); width: 16px; height: 16px; cursor: pointer; }
    .remember-wrap span { color: rgba(255,255,255,.6); font-size: .83rem; }
    .forgot-link {
      color: var(--blue-light); font-size: .83rem; font-weight: 500;
      text-decoration: none; transition: color .2s;
    }
    .forgot-link:hover { color: #fff; }

    /* 로그인 버튼 */
    .btn-login {
      width: 100%; padding: 14px;
      background: var(--blue); color: #fff;
      border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background .25s, transform .25s, box-shadow .25s;
      margin-bottom: 20px; font-family: inherit;
      position: relative; overflow: hidden;
    }
    .btn-login:hover { background: #1278e0; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(30,144,255,.45); }
    .btn-login:active { transform: translateY(0); }
    .btn-login.loading { pointer-events: none; }
    .btn-login .spinner {
      display: none; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
      margin: 0 auto;
    }
    .btn-login.loading .btn-label { display: none; }
    .btn-login.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 소셜 구분선 */
    .divider {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(255,255,255,.12);
    }
    .divider span { color: rgba(255,255,255,.4); font-size: .8rem; white-space: nowrap; }

    /* 소셜 로그인 */
    .social-login { display: flex; gap: 12px; margin-bottom: 28px; }
    .btn-social {
      flex: 1; padding: 11px 8px;
      background: rgba(255,255,255,.06); border: 1.5px solid rgba(255,255,255,.12);
      border-radius: 12px; color: rgba(255,255,255,.75);
      font-size: .83rem; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .25s, border-color .25s; font-family: inherit;
    }
    .btn-social:hover { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.25); color: #fff; }
    .btn-social svg { flex-shrink: 0; }

    /* 회원가입 링크 */
    .signup-row {
      text-align: center; color: rgba(255,255,255,.45); font-size: .88rem;
    }
    .signup-row a {
      color: var(--blue); font-weight: 600; text-decoration: none;
      margin-left: 4px; transition: color .2s;
    }
    .signup-row a:hover { color: #64b5f6; }

    /* 뒤로가기 버튼 */
    .btn-back-page {
      display: flex; align-items: center; gap: 7px;
      color: rgba(255,255,255,.65); font-size: .88rem; font-weight: 500;
      background: rgba(255,255,255,.08);
      border: 1.5px solid rgba(255,255,255,.15);
      border-radius: 50px; padding: 8px 16px;
      cursor: pointer; transition: all .25s; font-family: inherit;
      margin-right: 20px; flex-shrink: 0;
    }
    .btn-back-page:hover {
      color: #fff; border-color: rgba(255,255,255,.4);
      background: rgba(255,255,255,.13);
      transform: translateX(-2px);
    }

    /* 비밀번호 찾기 패널 */
    .forgot-panel { display: none; animation: cardIn .35s ease both; }
    .forgot-panel.active { display: block; }
    .btn-back-form {
      display: inline-flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,.5); font-size: .82rem;
      background: none; border: none; cursor: pointer;
      font-family: inherit; padding: 0; margin-bottom: 22px;
      transition: color .2s;
    }
    .btn-back-form:hover { color: #fff; }
    .forgot-icon { font-size: 2.2rem; margin-bottom: 12px; }
    .forgot-main h2 { font-size: 1.4rem; font-weight: 800; color: #fff; margin-bottom: 8px; }
    .forgot-main .fp-desc { color: rgba(255,255,255,.5); font-size: .88rem; line-height: 1.65; margin-bottom: 22px; }
    .forgot-success { display: none; text-align: center; padding: 10px 0; animation: cardIn .35s ease both; }
    .forgot-success.active { display: block; }
    .fs-icon { font-size: 3rem; margin-bottom: 16px; }
    .forgot-success h2 { font-size: 1.3rem; font-weight: 800; color: #fff; margin-bottom: 10px; }
    .forgot-success p { color: rgba(255,255,255,.45); font-size: .88rem; line-height: 1.65; margin-bottom: 28px; }

    /* 모바일 */
    @media (max-width: 480px) {
      .login-header { padding: 18px 20px; }
      .login-card { padding: 32px 22px; border-radius: 18px; }
      .social-login { flex-direction: column; }
      .btn-back-page span { display: none; }
    }
  </style>
</head>
<body>

  <!-- 배경 장식 -->
  <div class="login-bg">
    <div class="login-orb o1"></div>
    <div class="login-orb o2"></div>
  </div>

  <!-- 헤더 -->
  <header class="login-header">
    <button class="btn-back-page" onclick="history.length > 1 ? history.back() : location.href='index.html'">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M10 12L6 8l4-4"/>
      </svg>
      <span>뒤로가기</span>
    </button>
    <a href="index.html" class="login-logo">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none" aria-hidden="true">
        <circle cx="14" cy="14" r="14" fill="#1e90ff"/>
        <polygon points="11,8 22,14 11,20" fill="#fff"/>
      </svg>
      StreamBlue
    </a>
  </header>

  <!-- 로그인 카드 -->
  <main class="login-main">
    <div class="login-card">
      <h1>다시 오셨군요!</h1>
      <p class="subtitle">이메일과 비밀번호로 로그인하세요</p>

      <form id="loginForm" novalidate>
        <!-- 이메일 -->
        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" name="email"
                 placeholder="example@email.com" autocomplete="email" />
          <p class="field-msg" id="emailMsg"></p>
        </div>

        <!-- 비밀번호 -->
        <div class="form-group">
          <label for="password">비밀번호</label>
          <div class="pw-wrap">
            <input type="password" id="password" name="password"
                   placeholder="비밀번호를 입력하세요" autocomplete="current-password" />
            <span class="pw-toggle" id="pwToggle" aria-label="비밀번호 표시/숨기기">👁</span>
          </div>
          <p class="field-msg" id="pwMsg"></p>
        </div>

        <!-- 옵션 -->
        <div class="form-options">
          <label class="remember-wrap">
            <input type="checkbox" id="remember" />
            <span>로그인 상태 유지</span>
          </label>
          <a href="#" class="forgot-link">비밀번호 찾기</a>
        </div>

        <!-- 로그인 버튼 -->
        <button type="submit" class="btn-login" id="loginBtn">
          <span class="btn-label">로그인</span>
          <span class="spinner"></span>
        </button>
      </form>

      <!-- 비밀번호 찾기 패널 -->
      <div class="forgot-panel" id="forgotPanel">
        <button class="btn-back-form" id="backToLogin">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 12L6 8l4-4"/></svg>
          로그인으로 돌아가기
        </button>

        <!-- 입력 폼 -->
        <div class="forgot-main" id="forgotMain">
          <div class="forgot-icon">🔑</div>
          <h2>비밀번호 찾기</h2>
          <p class="fp-desc">가입 시 사용한 이메일을 입력해 주세요.<br/>비밀번호 재설정 링크를 보내드립니다.</p>
          <div class="form-group">
            <label for="forgotEmail">이메일</label>
            <input type="email" id="forgotEmail" placeholder="example@email.com" autocomplete="email" />
            <p class="field-msg" id="forgotMsg"></p>
          </div>
          <button class="btn-login" id="forgotSubmitBtn">
            <span class="btn-label">재설정 링크 발송</span>
            <span class="spinner"></span>
          </button>
        </div>

        <!-- 발송 완료 -->
        <div class="forgot-success" id="forgotSuccess">
          <div class="fs-icon">📧</div>
          <h2>이메일을 확인해 주세요</h2>
          <p id="forgotSuccessDesc">입력하신 이메일로 비밀번호 재설정 링크를 발송했습니다. 메일함을 확인하고 링크를 클릭하세요.</p>
          <button class="btn-login" id="backToLoginSuccess">로그인으로 돌아가기</button>
        </div>
      </div>

      <!-- 소셜 로그인 -->
      <div class="divider" id="socialDivider"><span>또는 소셜 계정으로 계속하기</span></div>
      <div class="social-login" id="socialLogin">
        <button class="btn-social" id="kakaoBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#3C1E1E" aria-hidden="true">
            <path d="M12 3C6.477 3 2 6.477 2 10.8c0 2.8 1.76 5.26 4.4 6.72l-1.1 4.1c-.1.36.32.64.62.42L10.74 19c.41.04.83.06 1.26.06 5.523 0 10-3.477 10-7.8S17.523 3 12 3z"/>
          </svg>
          카카오
        </button>
        <button class="btn-social" id="naverBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#03C75A" aria-hidden="true">
            <path d="M16.273 12.845L7.376 0H0v24h7.727V11.155L16.624 24H24V0h-7.727z"/>
          </svg>
          네이버
        </button>
        <button class="btn-social" id="googleBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          구글
        </button>
      </div>

      <p class="signup-row">
        아직 회원이 아니신가요?
        <a href="signup.html">회원가입</a>
      </p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    /* 비밀번호 표시/숨기기 */
    const pwInput = document.getElementById('password');
    const pwToggle = document.getElementById('pwToggle');
    pwToggle.addEventListener('click', () => {
      const isText = pwInput.type === 'text';
      pwInput.type = isText ? 'password' : 'text';
      pwToggle.textContent = isText ? '👁' : '🙈';
    });

    /* 이메일 유효성 실시간 */
    const emailInput = document.getElementById('email');
    const emailMsg   = document.getElementById('emailMsg');
    emailInput.addEventListener('blur', () => {
      const val = emailInput.value.trim();
      if (!val) { emailMsg.className = 'field-msg'; return; }
      const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
      emailMsg.textContent = valid ? '올바른 이메일 형식입니다.' : '올바른 이메일 형식이 아닙니다.';
      emailMsg.className   = 'field-msg ' + (valid ? 'ok' : 'error');
    });

    /* 폼 제출 */
    const form     = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const pwMsg    = document.getElementById('pwMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      const pw    = pwInput.value;
      let valid   = true;

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        emailMsg.textContent = '이메일을 올바르게 입력해 주세요.';
        emailMsg.className   = 'field-msg error';
        valid = false;
      }
      if (pw.length < 6) {
        pwMsg.textContent = '비밀번호는 6자 이상이어야 합니다.';
        pwMsg.className   = 'field-msg error';
        valid = false;
      } else {
        pwMsg.className = 'field-msg';
      }
      if (!valid) return;

      loginBtn.classList.add('loading');

      const { error } = await _supabase.auth.signInWithPassword({ email, password: pw });

      if (error) {
        loginBtn.classList.remove('loading');
        emailMsg.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
        emailMsg.className   = 'field-msg error';
        return;
      }

      window.location.href = 'index.html';
    });

    /* ── 비밀번호 찾기 ── */
    const forgotPanel   = document.getElementById('forgotPanel');
    const forgotMain    = document.getElementById('forgotMain');
    const forgotSuccess = document.getElementById('forgotSuccess');
    const socialDivider = document.getElementById('socialDivider');
    const socialLoginEl = document.getElementById('socialLogin');
    const loginCard     = document.querySelector('.login-card h1');
    const loginSubtitle = document.querySelector('.login-card .subtitle');

    function showForgotPanel() {
      form.style.display          = 'none';
      socialDivider.style.display = 'none';
      socialLoginEl.style.display = 'none';
      loginCard.textContent       = '비밀번호 재설정';
      loginSubtitle.textContent   = '이메일로 재설정 링크를 받으세요';
      forgotPanel.classList.add('active');
    }

    function hideForgotPanel() {
      forgotPanel.classList.remove('active');
      forgotMain.style.display    = '';
      forgotSuccess.classList.remove('active');
      form.style.display          = '';
      socialDivider.style.display = '';
      socialLoginEl.style.display = '';
      loginCard.textContent       = '다시 오셨군요!';
      loginSubtitle.textContent   = '이메일과 비밀번호로 로그인하세요';
      document.getElementById('forgotMsg').className   = 'field-msg';
      document.getElementById('forgotMsg').textContent = '';
      document.getElementById('forgotEmail').value     = '';
    }

    document.querySelector('.forgot-link').addEventListener('click', (e) => {
      e.preventDefault(); showForgotPanel();
    });
    document.getElementById('backToLogin').addEventListener('click', hideForgotPanel);
    document.getElementById('backToLoginSuccess').addEventListener('click', hideForgotPanel);

    document.getElementById('forgotSubmitBtn').addEventListener('click', async () => {
      const email = document.getElementById('forgotEmail').value.trim();
      const msg   = document.getElementById('forgotMsg');
      const btn   = document.getElementById('forgotSubmitBtn');

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        msg.textContent = '이메일을 올바르게 입력해 주세요.';
        msg.className   = 'field-msg error';
        return;
      }
      msg.className = 'field-msg';
      btn.classList.add('loading');

      const base = location.href.replace(/login\.html.*$/, '');
      const { error } = await _supabase.auth.resetPasswordForEmail(email, {
        redirectTo: base + 'index.html'
      });

      btn.classList.remove('loading');

      if (error) {
        msg.textContent = '발송에 실패했습니다. 잠시 후 다시 시도해 주세요.';
        msg.className   = 'field-msg error';
        return;
      }

      forgotMain.style.display = 'none';
      document.getElementById('forgotSuccessDesc').textContent =
        `${email} 으로 비밀번호 재설정 링크를 발송했습니다. 메일함을 확인하고 링크를 클릭하세요.`;
      forgotSuccess.classList.add('active');
    });

    /* 소셜 로그인 버튼 (데모) */
    ['kakaoBtn','naverBtn','googleBtn'].forEach(id => {
      document.getElementById(id).addEventListener('click', () => {
        alert(document.getElementById(id).textContent.trim() + ' 로그인은 준비 중입니다.');
      });
    });
  </script>
</body>
</html>
