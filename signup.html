<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 - StreamBlue</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: var(--navy); min-height: 100vh; display: flex; flex-direction: column; }

    .login-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .login-orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: .45; }
    .login-orb.o1 {
      width: 480px; height: 480px;
      background: radial-gradient(circle, #1e90ff, transparent 70%);
      top: -140px; left: -80px;
      animation: orbFloat 9s ease-in-out infinite;
    }
    .login-orb.o2 {
      width: 340px; height: 340px;
      background: radial-gradient(circle, #0060df, transparent 70%);
      bottom: -80px; right: -60px;
      animation: orbFloat 7s ease-in-out infinite reverse;
    }

    /* 헤더 */
    .login-header {
      position: relative; z-index: 10;
      padding: 24px 40px;
      display: flex; align-items: center;
    }
    .login-logo {
      display: flex; align-items: center; gap: 10px;
      color: #fff; font-size: 1.2rem; font-weight: 800;
      text-decoration: none; letter-spacing: -.5px;
    }

    /* 메인 */
    .login-main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 16px 24px 48px; position: relative; z-index: 1;
    }

    /* 카드 */
    .login-card {
      width: 100%; max-width: 480px;
      background: rgba(26, 47, 71, 0.75);
      border: 1.5px solid rgba(30, 144, 255, .2);
      border-radius: 24px;
      padding: 40px 40px;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 80px rgba(0,0,0,.5);
      animation: cardIn .45s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform: translateY(28px) scale(.97); }
      to   { opacity:1; transform: translateY(0)  scale(1);    }
    }

    .login-card h1 { font-size: 1.65rem; font-weight: 800; color: #fff; margin-bottom: 6px; }
    .login-card .subtitle { color: rgba(255,255,255,.5); font-size: .88rem; margin-bottom: 28px; }

    /* 스텝 인디케이터 */
    .steps {
      display: flex; align-items: center; gap: 0;
      margin-bottom: 28px;
    }
    .step {
      display: flex; align-items: center; gap: 8px; flex: 1;
      position: relative;
    }
    .step:not(:last-child)::after {
      content: '';
      flex: 1; height: 2px;
      background: rgba(30,144,255,.2);
      margin: 0 10px;
      transition: background .4s;
    }
    .step:not(:last-child).done::after { background: var(--blue); }
    .step-dot {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; font-weight: 700;
      background: rgba(30,144,255,.15);
      border: 2px solid rgba(30,144,255,.3);
      color: rgba(255,255,255,.4);
      transition: all .3s;
    }
    .step.active .step-dot {
      background: var(--blue); border-color: var(--blue);
      color: #fff; box-shadow: 0 0 12px rgba(30,144,255,.5);
    }
    .step.done .step-dot {
      background: #22c55e; border-color: #22c55e; color: #fff;
    }
    .step-label { font-size: .72rem; color: rgba(255,255,255,.4); white-space: nowrap; }
    .step.active .step-label { color: #fff; font-weight: 600; }
    .step.done .step-label { color: #22c55e; }

    /* 폼 패널 */
    .form-panel { display: none; }
    .form-panel.active { display: block; }

    /* 폼 그룹 */
    .form-group { margin-bottom: 16px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group label {
      display: block; color: rgba(255,255,255,.7);
      font-size: .8rem; font-weight: 600;
      margin-bottom: 6px; letter-spacing: .02em;
    }
    .form-group input, .form-group select {
      width: 100%;
      background: rgba(255,255,255,.07);
      border: 1.5px solid rgba(30,144,255,.25);
      border-radius: 12px;
      padding: 12px 16px;
      color: #fff; font-size: .92rem;
      outline: none; transition: border-color .25s, background .25s;
      font-family: inherit;
      appearance: none;
    }
    .form-group select option { background: #1a2f47; color: #fff; }
    .form-group input::placeholder { color: rgba(255,255,255,.3); }
    .form-group input:focus, .form-group select:focus {
      border-color: var(--blue); background: rgba(30,144,255,.1);
    }
    .form-group input.valid   { border-color: #22c55e; }
    .form-group input.invalid { border-color: #ef4444; }

    .field-msg { font-size: .73rem; margin-top: 4px; display: none; }
    .field-msg.error { color: #f87171; display: block; }
    .field-msg.ok    { color: #4ade80; display: block; }

    /* 비밀번호 강도 */
    .pw-strength { margin-top: 8px; }
    .strength-bar {
      height: 4px; border-radius: 2px;
      background: rgba(255,255,255,.1); overflow: hidden; margin-bottom: 4px;
    }
    .strength-fill {
      height: 100%; border-radius: 2px;
      width: 0%; transition: width .35s, background .35s;
    }
    .strength-label { font-size: .72rem; color: rgba(255,255,255,.45); }

    /* 비밀번호 토글 */
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 46px; }
    .pw-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,.4); cursor: pointer; font-size: .9rem;
      transition: color .2s; user-select: none;
    }
    .pw-toggle:hover { color: rgba(255,255,255,.8); }

    /* 약관 */
    .terms-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 4px; }
    .term-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px;
      background: rgba(255,255,255,.04);
      border: 1.5px solid rgba(30,144,255,.12);
      border-radius: 10px;
      cursor: pointer; transition: border-color .2s;
    }
    .term-item:hover { border-color: rgba(30,144,255,.3); }
    .term-left { display: flex; align-items: center; gap: 10px; }
    .term-left input[type="checkbox"] { accent-color: var(--blue); width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
    .term-text strong { display: block; color: rgba(255,255,255,.85); font-size: .85rem; }
    .term-text span   { color: rgba(255,255,255,.4); font-size: .75rem; }
    .term-view { color: var(--blue-light); font-size: .75rem; font-weight: 500; white-space: nowrap; text-decoration: none; }
    .term-view:hover { color: #fff; }
    .all-agree {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 14px;
      background: rgba(30,144,255,.08);
      border: 1.5px solid rgba(30,144,255,.25);
      border-radius: 10px; cursor: pointer; margin-bottom: 12px;
    }
    .all-agree input[type="checkbox"] { accent-color: var(--blue); width: 17px; height: 17px; cursor: pointer; }
    .all-agree span { color: #fff; font-size: .9rem; font-weight: 700; }

    /* 완료 화면 */
    .success-panel {
      display: none; text-align: center; padding: 20px 0 10px;
      animation: cardIn .4s ease both;
    }
    .success-panel.active { display: block; }
    .success-icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(34,197,94,.15); border: 2px solid #22c55e;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin: 0 auto 20px;
      animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .success-panel h2 { font-size: 1.5rem; font-weight: 800; color: #fff; margin-bottom: 10px; }
    .success-panel p  { color: rgba(255,255,255,.55); font-size: .9rem; line-height: 1.7; margin-bottom: 28px; }

    /* 네비게이션 버튼 */
    .btn-nav {
      display: flex; gap: 12px; margin-top: 24px;
    }
    .btn-back {
      flex: 1; padding: 13px;
      background: rgba(255,255,255,.07); border: 1.5px solid rgba(255,255,255,.15);
      border-radius: 12px; color: rgba(255,255,255,.7);
      font-size: .95rem; font-weight: 600; cursor: pointer;
      transition: background .25s; font-family: inherit;
    }
    .btn-back:hover { background: rgba(255,255,255,.13); color: #fff; }
    .btn-next {
      flex: 2; padding: 13px;
      background: var(--blue); color: #fff;
      border: none; border-radius: 12px;
      font-size: .95rem; font-weight: 700; cursor: pointer;
      transition: background .25s, transform .25s, box-shadow .25s;
      font-family: inherit; position: relative;
    }
    .btn-next:hover { background: #1278e0; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(30,144,255,.4); }
    .btn-next:only-child { flex: 1; }
    .btn-next.loading { pointer-events: none; }
    .btn-next .btn-label { display: block; }
    .btn-next .spinner {
      display: none; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto;
    }
    .btn-next.loading .btn-label { display: none; }
    .btn-next.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 로그인 링크 */
    .login-row {
      text-align: center; color: rgba(255,255,255,.45);
      font-size: .87rem; margin-top: 20px;
    }
    .login-row a {
      color: var(--blue); font-weight: 600; text-decoration: none; margin-left: 4px;
    }
    .login-row a:hover { color: #64b5f6; }

    /* 뒤로가기 버튼 */
    .btn-back-page {
      display: flex; align-items: center; gap: 7px;
      color: rgba(255,255,255,.65); font-size: .88rem; font-weight: 500;
      background: rgba(255,255,255,.08);
      border: 1.5px solid rgba(255,255,255,.15);
      border-radius: 50px; padding: 8px 16px;
      cursor: pointer; transition: all .25s; font-family: inherit;
      margin-right: 20px; flex-shrink: 0;
    }
    .btn-back-page:hover {
      color: #fff; border-color: rgba(255,255,255,.4);
      background: rgba(255,255,255,.13);
      transform: translateX(-2px);
    }

    /* 반응형 */
    @media (max-width: 520px) {
      .login-header { padding: 18px 20px; }
      .login-card { padding: 30px 20px; border-radius: 18px; }
      .form-row { grid-template-columns: 1fr; gap: 0; }
      .step-label { display: none; }
      .btn-back-page span { display: none; }
    }
  </style>
</head>
<body>

  <div class="login-bg">
    <div class="login-orb o1"></div>
    <div class="login-orb o2"></div>
  </div>

  <header class="login-header">
    <button class="btn-back-page" onclick="history.length > 1 ? history.back() : location.href='login.html'">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M10 12L6 8l4-4"/>
      </svg>
      <span>뒤로가기</span>
    </button>
    <a href="index.html" class="login-logo">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none" aria-hidden="true">
        <circle cx="14" cy="14" r="14" fill="#1e90ff"/>
        <polygon points="11,8 22,14 11,20" fill="#fff"/>
      </svg>
      StreamBlue
    </a>
  </header>

  <main class="login-main">
    <div class="login-card">
      <h1>회원가입</h1>
      <p class="subtitle">StreamBlue와 함께 무한한 콘텐츠를 즐겨보세요</p>

      <!-- 스텝 인디케이터 -->
      <div class="steps" id="steps">
        <div class="step active" id="step1">
          <div class="step-dot">1</div>
          <span class="step-label">기본 정보</span>
        </div>
        <div class="step" id="step2">
          <div class="step-dot">2</div>
          <span class="step-label">보안 설정</span>
        </div>
        <div class="step" id="step3">
          <div class="step-dot">3</div>
          <span class="step-label">약관 동의</span>
        </div>
      </div>

      <!-- ── STEP 1: 기본 정보 ── -->
      <div class="form-panel active" id="panel1">
        <div class="form-row">
          <div class="form-group">
            <label for="lastName">성</label>
            <input type="text" id="lastName" placeholder="홍" autocomplete="family-name" />
            <p class="field-msg" id="lastNameMsg"></p>
          </div>
          <div class="form-group">
            <label for="firstName">이름</label>
            <input type="text" id="firstName" placeholder="길동" autocomplete="given-name" />
            <p class="field-msg" id="firstNameMsg"></p>
          </div>
        </div>
        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" placeholder="example@email.com" autocomplete="email" />
          <p class="field-msg" id="emailMsg"></p>
        </div>
        <div class="form-group">
          <label for="phone">휴대폰 번호</label>
          <input type="tel" id="phone" placeholder="010-0000-0000" autocomplete="tel" />
          <p class="field-msg" id="phoneMsg"></p>
        </div>
        <div class="form-group">
          <label for="birth">생년월일</label>
          <input type="date" id="birth" autocomplete="bday" />
          <p class="field-msg" id="birthMsg"></p>
        </div>
        <div class="btn-nav">
          <button class="btn-next" id="next1">
            <span class="btn-label">다음 단계</span>
            <span class="spinner"></span>
          </button>
        </div>
      </div>

      <!-- ── STEP 2: 보안 설정 ── -->
      <div class="form-panel" id="panel2">
        <div class="form-group">
          <label for="pw">비밀번호</label>
          <div class="pw-wrap">
            <input type="password" id="pw" placeholder="8자 이상, 영문+숫자+특수문자" />
            <span class="pw-toggle" id="pwToggle1">👁</span>
          </div>
          <div class="pw-strength">
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <span class="strength-label" id="strengthLabel">비밀번호를 입력해 주세요</span>
          </div>
          <p class="field-msg" id="pwMsg"></p>
        </div>
        <div class="form-group">
          <label for="pwConfirm">비밀번호 확인</label>
          <div class="pw-wrap">
            <input type="password" id="pwConfirm" placeholder="비밀번호를 한 번 더 입력하세요" />
            <span class="pw-toggle" id="pwToggle2">👁</span>
          </div>
          <p class="field-msg" id="pwConfirmMsg"></p>
        </div>
        <div class="form-group">
          <label for="plan">요금제 선택</label>
          <select id="plan">
            <option value="">요금제를 선택하세요</option>
            <option value="basic">베이직 - ₩9,900/월 (HD, 1개 기기)</option>
            <option value="standard">스탠다드 - ₩13,900/월 (FHD, 2개 기기)</option>
            <option value="premium">프리미엄 - ₩17,900/월 (4K, 5개 기기)</option>
          </select>
          <p class="field-msg" id="planMsg"></p>
        </div>
        <div class="btn-nav">
          <button class="btn-back" id="back2">이전</button>
          <button class="btn-next" id="next2">
            <span class="btn-label">다음 단계</span>
            <span class="spinner"></span>
          </button>
        </div>
      </div>

      <!-- ── STEP 3: 약관 동의 ── -->
      <div class="form-panel" id="panel3">
        <label class="all-agree">
          <input type="checkbox" id="agreeAll" />
          <span>전체 동의</span>
        </label>
        <div class="terms-list">
          <div class="term-item">
            <div class="term-left">
              <input type="checkbox" class="term-check" id="term1" />
              <div class="term-text">
                <strong>[필수] 서비스 이용약관</strong>
                <span>StreamBlue 이용약관에 동의합니다</span>
              </div>
            </div>
            <a href="#" class="term-view" onclick="return false">보기</a>
          </div>
          <div class="term-item">
            <div class="term-left">
              <input type="checkbox" class="term-check" id="term2" />
              <div class="term-text">
                <strong>[필수] 개인정보 처리방침</strong>
                <span>개인정보 수집 및 이용에 동의합니다</span>
              </div>
            </div>
            <a href="#" class="term-view" onclick="return false">보기</a>
          </div>
          <div class="term-item">
            <div class="term-left">
              <input type="checkbox" class="term-check" id="term3" />
              <div class="term-text">
                <strong>[선택] 마케팅 정보 수신</strong>
                <span>이벤트 및 혜택 알림을 받습니다</span>
              </div>
            </div>
            <a href="#" class="term-view" onclick="return false">보기</a>
          </div>
        </div>
        <p class="field-msg" id="termMsg" style="margin-top:8px;"></p>
        <div class="btn-nav">
          <button class="btn-back" id="back3">이전</button>
          <button class="btn-next" id="submitBtn">
            <span class="btn-label">가입 완료</span>
            <span class="spinner"></span>
          </button>
        </div>
      </div>

      <!-- ── 완료 ── -->
      <div class="success-panel" id="successPanel">
        <div class="success-icon">✓</div>
        <h2>가입을 환영합니다!</h2>
        <p id="welcomeMsg">StreamBlue 회원이 되셨습니다.<br />지금 바로 무한한 콘텐츠를 즐겨보세요.</p>
        <button class="btn-next" id="goLogin" style="width:100%;">
          <span class="btn-label">로그인하러 가기</span>
          <span class="spinner"></span>
        </button>
      </div>

      <p class="login-row">
        이미 회원이신가요?
        <a href="login.html">로그인</a>
      </p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    /* ── 유틸 ── */
    const $ = id => document.getElementById(id);
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const phoneRe = /^01[0-9]-?\d{3,4}-?\d{4}$/;

    function setMsg(el, text, type) {
      el.textContent = text;
      el.className = 'field-msg' + (type ? ' ' + type : '');
    }
    function markInput(input, valid) {
      input.classList.toggle('valid',   valid === true);
      input.classList.toggle('invalid', valid === false);
    }

    /* ── 스텝 이동 ── */
    let currentStep = 1;
    function goStep(n) {
      for (let i = 1; i <= 3; i++) {
        const panel = $('panel' + i);
        const step  = $('step' + i);
        panel.classList.toggle('active', i === n);
        step.classList.remove('active', 'done');
        if (i < n)  step.classList.add('done');
        if (i === n) step.classList.add('active');
        // 완료 체크 표시
        if (i < n) step.querySelector('.step-dot').textContent = '✓';
        else step.querySelector('.step-dot').textContent = i;
      }
      currentStep = n;
    }

    /* ── STEP 1 유효성 ── */
    function validateStep1() {
      let ok = true;
      const ln = $('lastName'), fn = $('firstName');
      const em = $('email'),    ph = $('phone'), br = $('birth');

      if (!ln.value.trim()) { setMsg($('lastNameMsg'),'성을 입력해 주세요','error'); markInput(ln,false); ok=false; }
      else { setMsg($('lastNameMsg'),'',''); markInput(ln,true); }

      if (!fn.value.trim()) { setMsg($('firstNameMsg'),'이름을 입력해 주세요','error'); markInput(fn,false); ok=false; }
      else { setMsg($('firstNameMsg'),'',''); markInput(fn,true); }

      if (!emailRe.test(em.value.trim())) { setMsg($('emailMsg'),'올바른 이메일을 입력해 주세요','error'); markInput(em,false); ok=false; }
      else { setMsg($('emailMsg'),'사용 가능한 이메일입니다','ok'); markInput(em,true); }

      if (!phoneRe.test(ph.value.trim())) { setMsg($('phoneMsg'),'올바른 번호를 입력해 주세요 (예: 010-1234-5678)','error'); markInput(ph,false); ok=false; }
      else { setMsg($('phoneMsg'),'',''); markInput(ph,true); }

      if (!br.value) { setMsg($('birthMsg'),'생년월일을 선택해 주세요','error'); markInput(br,false); ok=false; }
      else { setMsg($('birthMsg'),'',''); markInput(br,true); }

      return ok;
    }

    $('next1').addEventListener('click', () => {
      if (validateStep1()) goStep(2);
    });

    /* ── STEP 2 비밀번호 강도 ── */
    const pwInput = $('pw');
    function checkStrength(pw) {
      let score = 0;
      if (pw.length >= 8) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      const fill  = $('strengthFill');
      const label = $('strengthLabel');
      const map = [
        { w:'0%',   bg:'transparent', t:'비밀번호를 입력해 주세요' },
        { w:'25%',  bg:'#ef4444',     t:'매우 약함' },
        { w:'50%',  bg:'#f97316',     t:'약함' },
        { w:'75%',  bg:'#eab308',     t:'보통' },
        { w:'100%', bg:'#22c55e',     t:'강함' },
      ];
      const m = pw.length === 0 ? map[0] : map[Math.min(score, 4)];
      fill.style.width      = m.w;
      fill.style.background = m.bg;
      label.textContent     = m.t;
      label.style.color     = m.bg || 'rgba(255,255,255,.45)';
    }
    pwInput.addEventListener('input', () => checkStrength(pwInput.value));

    /* 비밀번호 표시 토글 */
    [['pw','pwToggle1'],['pwConfirm','pwToggle2']].forEach(([inputId, btnId]) => {
      $( btnId).addEventListener('click', () => {
        const inp = $(inputId);
        const isText = inp.type === 'text';
        inp.type = isText ? 'password' : 'text';
        $(btnId).textContent = isText ? '👁' : '🙈';
      });
    });

    function validateStep2() {
      let ok = true;
      const pw = pwInput.value, pc = $('pwConfirm').value, plan = $('plan').value;

      if (pw.length < 8) {
        setMsg($('pwMsg'),'비밀번호는 8자 이상이어야 합니다','error'); markInput(pwInput,false); ok=false;
      } else {
        setMsg($('pwMsg'),'',''); markInput(pwInput,true);
      }

      if (pc !== pw || !pc) {
        setMsg($('pwConfirmMsg'),'비밀번호가 일치하지 않습니다','error'); markInput($('pwConfirm'),false); ok=false;
      } else {
        setMsg($('pwConfirmMsg'),'비밀번호가 일치합니다','ok'); markInput($('pwConfirm'),true);
      }

      if (!plan) { setMsg($('planMsg'),'요금제를 선택해 주세요','error'); ok=false; }
      else { setMsg($('planMsg'),'',''); }

      return ok;
    }

    $('back2').addEventListener('click', () => goStep(1));
    $('next2').addEventListener('click', () => {
      if (validateStep2()) goStep(3);
    });

    /* ── STEP 3 약관 ── */
    const agreeAll   = $('agreeAll');
    const termChecks = document.querySelectorAll('.term-check');

    agreeAll.addEventListener('change', () => {
      termChecks.forEach(c => c.checked = agreeAll.checked);
    });
    termChecks.forEach(c => {
      c.addEventListener('change', () => {
        agreeAll.checked = [...termChecks].every(ch => ch.checked);
      });
    });

    $('back3').addEventListener('click', () => goStep(2));

    $('submitBtn').addEventListener('click', async () => {
      const req = [$('term1').checked, $('term2').checked];
      if (!req.every(Boolean)) {
        setMsg($('termMsg'),'필수 약관에 모두 동의해 주세요','error'); return;
      }
      setMsg($('termMsg'),'','');

      const btn      = $('submitBtn');
      const email    = $('email').value.trim();
      const pw       = $('pw').value;
      const nickname = ($('lastName').value.trim() + $('firstName').value.trim()) || '회원';

      btn.classList.add('loading');

      const { error } = await _supabase.auth.signUp({
        email,
        password: pw,
        options: { data: { nickname } }
      });

      if (error) {
        btn.classList.remove('loading');
        setMsg($('termMsg'), error.message, 'error');
        return;
      }

      btn.classList.remove('loading');
      document.getElementById('steps').style.display = 'none';
      ['panel1','panel2','panel3'].forEach(id => $(id).classList.remove('active'));
      $('welcomeMsg').innerHTML =
        `<strong style="color:#fff">${nickname}</strong>님, StreamBlue 회원이 되셨습니다.<br />지금 바로 무한한 콘텐츠를 즐겨보세요.`;
      $('successPanel').classList.add('active');
      document.querySelector('.login-row').style.display = 'none';
    });

    $('goLogin').addEventListener('click', () => {
      $('goLogin').classList.add('loading');
      setTimeout(() => { window.location.href = 'login.html'; }, 900);
    });
  </script>
</body>
</html>
